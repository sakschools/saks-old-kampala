<div class="container py-5">
    {{ $general := index hugo.Data.settings "general" }}
    <div class="row">
        <div class="col-md-4">
            <h2 class="mb-4">Motto</h2>
            {{/* Accessing the nested school object */}}
            <p>"{{ $general.school.motto }}"</p>
        </div>
        <div class="col-md-4">
            <h2 class="mb-4">Mission</h2>
            <p>"{{ $general.school.mission }}"</p>
        </div>
        <div class="col-md-4">
            <h2 class="mb-4">Vision</h2>
            <p>{{ $general.school.vision }}</p>
        </div>
    </div>
</div>
