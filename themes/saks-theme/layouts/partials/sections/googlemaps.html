{{ $general := index hugo.Data.settings "general" }}

<div class="container py-5">
    <div class="card">
        <div class="card-header">
            <h5 class="card-title">{{ $general.title }} Location</h5>
        </div>
        <div class="card-body p-0">
            {{ with $general.google_map_src }}
            <div class="embed-responsive position-relative" style="width: 100%; height: 400px;">
                <iframe src="{{ . | safeHTMLAttr }}" 
                        width="100%" 
                        height="400" 
                        style="border:0; vertical-align: middle;" 
                        allowfullscreen="" 
                        loading="lazy" 
                        referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
            {{ else }}
            <div class="p-4 text-center text-muted">
                <p>Location map not configured yet.</p>
            </div>
            {{ end }}
        </div>
    </div>
</div>
