<!-- Head teacher Message Start -->
{{ $hm := index hugo.Data.settings "headteacher" }}
{{ $general := index hugo.Data.settings "general" }}

<div class="container-xxl py-4">
    <div class="container">
        <div class="row g-5">
            <div class="col-lg-6 wow fadeInUp" data-wow-delay="0.5s">
                <div class="h-100">
                    <h1 class="display-6 mb-4">{{ $hm.title | upper }}</h1>
                    <p>{{ $hm.message_preview }}</p>
                    <div class="row g-4">
                        <div class="col-sm-6">
                            <h5>{{ $hm.name }}</h5>
                            <h6>{{ $general.title }}</h6>
                            <a class="btn btn-primary py-2 px-5" href="{{ $hm.button_link | relURL }}">
                                {{ $hm.button_text }}
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-6 wow fadeInUp" data-wow-delay="0.1s">
                <div class="position-relative overflow-hidden ps-5 pt-5 h-100" style="min-height: 400px;">
                    <img class="position-absolute border border-danger border-2 start-0 top-0" 
                         src="{{ $hm.image | relURL }}" 
                         alt="{{ $hm.image_alt }}" 
                         style="object-fit: cover; height: 100%;">
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Head teacher Message End -->
