<!-- Contact Start -->
<div class="container-xxl py-6">
    <div class="container">
        <div class="row pb-5">
            <div class="col-lg-3 col-md-6 mb-4">
                <div class="dbox w-100 text-center">
                    <div class="icon d-flex align-items-center justify-content-center mb-2">
                        <span class="fab fa-whatsapp" style="color: #4AC959; font-size: 40px;"></span>
                    </div>
                    <div class="text">
                        <p style="font-size: 14px; word-break: break-word;"><span class="fw-bold">Whatsapp:</span><br><a href="{{ hugo.Data.settings.social.whatsapp }}" target="_blank" style="color: inherit; text-decoration: none;">{{ hugo.Data.settings.social.tel }}</a></p>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6 mb-4">
                <div class="dbox w-100 text-center">
                    <div class="icon d-flex align-items-center justify-content-center mb-2">
                        <span class="fa fa-phone" style="color: #4a81c9; font-size: 40px;"></span>
                    </div>
                    <div class="text">
                        <p style="font-size: 14px; word-break: break-word;"><span class="fw-bold">Phone:</span><br>{{ hugo.Data.settings.social.tel }}</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6 mb-4">
                <div class="dbox w-100 text-center">
                    <div class="icon d-flex align-items-center justify-content-center mb-2">
                        <span class="fa fa-paper-plane" style="color: #c94a4a; font-size: 40px;"></span>
                    </div>
                    <div class="text">
                        <p style="font-size: 14px; word-break: break-word;"><span class="fw-bold">Email:</span><br>{{ hugo.Data.settings.general.email }}</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6 mb-4">
                <div class="dbox w-100 text-center">
                    <div class="icon d-flex align-items-center justify-content-center mb-2">
                        <span class="fa fa-globe" style="color: #270404; font-size: 40px;"></span>
                    </div>
                    <div class="text">
                        <p style="font-size: 14px; word-break: break-word;">
                            <span class="fw-bold">Website:</span><br>
                            <!-- We force https:// in the href, but keep the display text clean -->
                            <a href="https://{{ hugo.Data.settings.general.baseURL | replaceRE "^https?://" "" }}" style="color: inherit; text-decoration: none;">
                                {{ hugo.Data.settings.general.baseURL | replaceRE "^https?://(www\\.)?" "" | replaceRE "/$" "" }}
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
        <div class="row g-5">
            <div class="col-lg-6 wow fadeInUp" data-wow-delay="0.1s" style="min-height: 450px;">
                <div class="position-relative h-100">
                    <iframe class="position-relative w-100 h-100"
                    src="{{ hugo.Data.settings.general.google_map_src }}"
                    width="640" height="480" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
            <div class="col-lg-6 wow fadeInUp" data-wow-delay="0.5s">
                <h1 class="display-6 mb-4">If You Have Any Query, Please Contact Us</h1>

                <form id="myForm" action="https://docs.google.com/forms/d/e/1FAIpQLSf5coJvclPMW71bzU3CDCrbRcEVw137D9AZMe4rmLQ2KY2-Ig/formResponse" 
                method="POST" target="hiddenConfirm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control border-0 bg-light" id="name" name="entry.1102758237" placeholder="Your Name">
                                <label for="name">Your Name</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="email" class="form-control border-0 bg-light" id="email" name="entry.795743780" placeholder="Your Email">
                                <label for="email">Your Email</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-floating">
                                <input type="text" class="form-control border-0 bg-light" id="subject" name="entry.1011376382" placeholder="Subject">
                                <label for="subject">Subject</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-floating">
                                <textarea class="form-control border-0 bg-light" placeholder="Leave a message here" id="message" name="entry.1310971257" style="height: 150px"></textarea>
                                <label for="message">Message</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <button class="btn btn-primary py-3 px-5" type="submit">Send Message</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<!-- Contact End -->
